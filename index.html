<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CreatorRewards — Get Paid. Stay You. Create More.</title>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@700,600&f[]=cabinet-grotesk@400,500,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>

    <!-- Post-Processing Overlays -->
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- SVG Filters for Liquid/Cloud Effects -->
    <svg xmlns="http://www.w3.org/2000/svg" style="position: absolute; width: 0; height: 0; pointer-events: none;">
      <filter id="liquid-filter" x="-50%" y="-50%" width="200%" height="200%">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" />
      </filter>
      
      <filter id="cloud-filter" x="-50%" y="-50%" width="200%" height="200%">
        <feTurbulence type="fractalNoise" seed="462" baseFrequency="0.011" numOctaves="5" result="noise1" />
        <feGaussianBlur in="SourceGraphic" stdDeviation="20" />
        <feDisplacementMap scale="100" in2="noise1" />
      </filter>
    </svg>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
